<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080808;
    --surface: #111111;
    --border: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.85);
    --muted: rgba(255,255,255,0.35);
    --accent: #7B6EF6;
    --accent-dim: rgba(123,110,246,0.2);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 14px 20px 16px;
  }

  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  #back {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  #back:hover { color: var(--text); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
  #back svg { width: 13px; height: 13px; }

  #filename {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    max-width: 300px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  video {
    max-width: 100%;
    max-height: 100%;
    border-radius: 6px;
    background: #000;
    display: block;
  }

  #no-url {
    text-align: center;
    display: none;
  }
  #no-url h1 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
  #no-url p { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  #controls {
    flex-shrink: 0;
    padding-top: 10px;
  }

  #seekbar {
    width: 100%;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    margin-bottom: 10px;
    position: relative;
  }
  #seekbar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #seekbar:hover::-webkit-slider-thumb { transform: scale(1.2); }

  #seekbar::-webkit-slider-runnable-track {
    height: 3px;
    border-radius: 2px;
  }

  #ctrl-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  #ctrl-left, #ctrl-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cbtn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.12s;
    border-radius: 4px;
  }
  .cbtn:hover { color: var(--text); }
  .cbtn svg { width: 18px; height: 18px; }
  #pp-btn svg { width: 20px; height: 20px; }

  #timecode {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 90px;
  }

  #vol-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  #volbar {
    width: 60px;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    accent-color: white;
  }
  #volbar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
  }

  #speed-select {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 6px;
    cursor: pointer;
    outline: none;
  }
  #speed-select:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  #speed-select option { background: #1a1a1a; }

  #kbd-hint {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .hint {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
  }
  .key {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="back" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      back
    </button>
    <span id="filename">no file</span>
  </div>

  <div id="stage">
    <video id="v" autoplay></video>
    <div id="no-url">
      <h1>No video URL provided</h1>
      <p>Use the bookmarklet on a MediaFire page</p>
    </div>
  </div>

  <div id="controls">
    <input type="range" id="seekbar" min="0" max="1000" value="0">
    <div id="ctrl-row">
      <div id="ctrl-left">
        <button class="cbtn" id="pp-btn" onclick="togglePlay()" aria-label="Play/pause">
          <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span id="timecode">0:00 / 0:00</span>
      </div>
      <div id="ctrl-right">
        <div id="vol-wrap">
          <button class="cbtn" onclick="toggleMute()" aria-label="Mute">
            <svg id="vol-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <input type="range" id="volbar" min="0" max="100" value="80" oninput="setVol(this.value)">
        </div>
        <select id="speed-select" onchange="v.playbackRate=parseFloat(this.value)">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
        <button class="cbtn" onclick="goFS()" aria-label="Fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
      </div>
    </div>
    <div id="kbd-hint">
      <span class="hint"><span class="key">space</span> play/pause</span>
      <span class="hint"><span class="key">←</span><span class="key">→</span> seek 10s</span>
      <span class="hint"><span class="key">↑</span><span class="key">↓</span> volume</span>
      <span class="hint"><span class="key">F</span> fullscreen</span>
      <span class="hint"><span class="key">M</span> mute</span>
    </div>
  </div>
</div>

<script>
  var v = document.getElementById('v');
  var seekbar = document.getElementById('seekbar');
  var timecode = document.getElementById('timecode');
  var playIcon = document.getElementById('play-icon');
  var volIcon = document.getElementById('vol-icon');
  var volbar = document.getElementById('volbar');

  var params = new URLSearchParams(window.location.search);
  var src = params.get('v');
  var origin = params.get('from');

  if (src) {
    v.src = decodeURIComponent(src);
    v.style.display = 'block';
    var fn = decodeURIComponent(src).split('/').pop().split('?')[0] || 'video';
    document.getElementById('filename').textContent = fn;
    document.title = fn;
  } else {
    v.style.display = 'none';
    document.getElementById('no-url').style.display = 'block';
  }

  v.volume = 0.8;

  function goBack() {
    if (origin) { window.location.href = decodeURIComponent(origin); }
    else { window.history.back(); }
  }

  function togglePlay() {
    v.paused ? v.play() : v.pause();
  }

  function goFS() {
    v.requestFullscreen && v.requestFullscreen();
  }

  function toggleMute() {
    v.muted = !v.muted;
    updateVolIcon();
  }

  function setVol(val) {
    v.volume = val / 100;
    if (v.muted && val > 0) v.muted = false;
    updateVolIcon();
  }

  function updateVolIcon() {
    var muted = v.muted || v.volume === 0;
    volIcon.outerHTML = muted
      ? '<svg id="vol-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
      : '<svg id="vol-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
    volIcon = document.getElementById('vol-icon');
  }

  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    var m = Math.floor(s / 60);
    return m + ':' + ('' + Math.floor(s % 60)).padStart(2, '0');
  }

  var seeking = false;
  seekbar.addEventListener('mousedown', function() { seeking = true; });
  seekbar.addEventListener('mouseup', function() {
    seeking = false;
    v.currentTime = (seekbar.value / 1000) * (v.duration || 0);
  });
  seekbar.addEventListener('touchend', function() {
    seeking = false;
    v.currentTime = (seekbar.value / 1000) * (v.duration || 0);
  });

  v.addEventListener('timeupdate', function() {
    if (!seeking) {
      seekbar.value = v.duration ? (v.currentTime / v.duration * 1000) : 0;
    }
    timecode.textContent = fmt(v.currentTime) + ' / ' + fmt(v.duration);
  });

  v.addEventListener('play', function() {
    playIcon.outerHTML = '<svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    playIcon = document.getElementById('play-icon');
  });

  v.addEventListener('pause', function() {
    playIcon.outerHTML = '<svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    playIcon = document.getElementById('play-icon');
  });

  document.addEventListener('keydown', function(e) {
    var tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'KeyF') { goFS(); }
    if (e.code === 'KeyM') { toggleMute(); }
    if (e.code === 'ArrowLeft') { e.preventDefault(); v.currentTime = Math.max(0, v.currentTime - 10); }
    if (e.code === 'ArrowRight') { e.preventDefault(); v.currentTime = Math.min(v.duration || 0, v.currentTime + 10); }
    if (e.code === 'ArrowUp') { e.preventDefault(); v.volume = Math.min(1, parseFloat((v.volume + 0.1).toFixed(1))); volbar.value = Math.round(v.volume * 100); updateVolIcon(); }
    if (e.code === 'ArrowDown') { e.preventDefault(); v.volume = Math.max(0, parseFloat((v.volume - 0.1).toFixed(1))); volbar.value = Math.round(v.volume * 100); updateVolIcon(); }
  });
</script>
</body>
</html>
